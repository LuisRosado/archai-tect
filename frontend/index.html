<!DOCTYPE html>
<html>

<head>
    <title>ArchAItect - AI System Design Generator</title>

    <meta charset="UTF-8">

    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

    <script>
        mermaid.initialize({
            startOnLoad: false
        });
    </script>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            margin:40px;
            background:#f5f5f5;
        }

        textarea{
            width:600px;
            font-size:16px;
        }

        button{
            padding:10px 20px;
            font-size:16px;
            cursor:pointer;
        }

        pre{
            background:white;
            padding:15px;
            border-radius:5px;
            width:600px;
        }

        #diagram{
            background:white;
            padding:20px;
            border-radius:5px;
            margin-top:10px;
            width:800px;
        }

    </style>

</head>

<body>

<h2>AI System Design Generator</h2>

<textarea id="prompt" rows="6">
architecture for chat application
</textarea>

<br><br>

<button onclick="generate()">Generate Architecture</button>

<h3>Components</h3>
<pre id="components"></pre>

<h3>Tech Stack</h3>
<pre id="techstack"></pre>

<h3>Architecture Diagram</h3>
<div id="diagram"></div>

<script src="/static/script.js"></script>

</body>
</html>
